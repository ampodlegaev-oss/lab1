<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Результат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center">Результат преобразования</h1>
    <div class="row">
        <div class="col-md-6">
            <h5>Исходное изображение</h5>
            <img src="{{ url_for('uploaded_file', filename=original) }}" class="img-fluid" alt="Исходное">
        </div>
        <div class="col-md-6">
            <h5>Обработанное (сдвиг = {{ shift }})</h5>
            <img src="{{ url_for('uploaded_file', filename=result) }}" class="img-fluid" alt="Результат">
        </div>
    </div>
    <div class="row mt-4">
        <div class="col-md-12">
            <h5>Гистограмма цветов (исходное)</h5>
            <img src="data:image/png;base64,{{ histogram }}" class="img-fluid" alt="Гистограмма">
        </div>
    </div>
    <div class="mt-3">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Обработать новое изображение</a>
    </div>
</div>
</body>
</html>
